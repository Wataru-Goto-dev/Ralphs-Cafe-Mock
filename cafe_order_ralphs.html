<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ralph's Café — Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --green:    #1B3A2D;
  --green-mid:#264D3B;
  --green-lt: #2E5E47;
  --cream:    #F6F1E9;
  --cream-dk: #EDE6D8;
  --cream-bd: #D9D0BE;
  --gold:     #B89A5A;
  --gold-lt:  #D4B87A;
  --ivory:    #FDFAF5;
  --text-dk:  #1A1A17;
  --text-md:  #3D3D35;
  --text-lt:  #7A7468;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
  background: var(--cream);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 24px 16px;
}

/* ── SHELL ── */
.shell {
  width: 390px;
  background: var(--ivory);
  border: 1px solid var(--cream-bd);
  overflow: hidden;
  position: relative;
}

/* ── TOP BAR ── */
.top-bar {
  background: var(--green);
  padding: 0 18px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--cream);
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.brand em {
  font-style: italic;
  color: var(--gold-lt);
  letter-spacing: 0.12em;
}
.call-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'EB Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cream);
  background: transparent;
  border: 1px solid rgba(214,183,120,0.55);
  border-radius: 0;
  padding: 6px 12px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.call-btn:hover { border-color: var(--gold-lt); color: var(--gold-lt); }
.call-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 1.5; }

/* ── BODY ── */
.body-area {
  display: flex;
  height: 540px;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 90px;
  min-width: 90px;
  background: var(--green);
  overflow-y: auto;
  border-right: none;
}
.sidebar::-webkit-scrollbar { width: 0; }

.side-item {
  padding: 16px 10px;
  font-family: 'EB Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: rgba(246,241,233,0.55);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  cursor: pointer;
  line-height: 1.5;
  transition: color 0.2s, background 0.2s;
}
.side-item:hover { color: rgba(246,241,233,0.85); }
.side-item.active {
  color: var(--gold-lt);
  background: rgba(255,255,255,0.06);
  border-left: 2px solid var(--gold);
  padding-left: 8px;
}

/* ── MENU AREA ── */
.menu-area {
  flex: 1;
  overflow-y: auto;
  background: var(--ivory);
}
.menu-area::-webkit-scrollbar { width: 3px; }
.menu-area::-webkit-scrollbar-thumb { background: var(--cream-bd); }

.section-hd {
  padding: 16px 14px 10px;
  background: var(--ivory);
  position: sticky;
  top: 0;
  z-index: 5;
  border-bottom: 1px solid var(--cream-dk);
}
.section-hd-label {
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  font-weight: 400;
  font-style: italic;
  color: var(--green);
  letter-spacing: 0.04em;
}

.menu-card {
  margin: 0 12px 10px;
  background: var(--ivory);
  border: 1px solid var(--cream-bd);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow: hidden;
  position: relative;
}
.menu-card:hover {
  border-color: var(--gold);
  box-shadow: 0 2px 12px rgba(27,58,45,0.08);
}
.menu-card:active { opacity: 0.85; }
.menu-card.sold-out { opacity: 0.45; pointer-events: none; }

.card-info { flex: 1; padding: 10px 12px 12px; }
.card-name {
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-dk);
  line-height: 1.5;
  margin-bottom: 4px;
  letter-spacing: 0.01em;
}
.card-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 0.04em;
}
.card-img {
  width: 100%;
  height: 110px;
  background: var(--cream-dk);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--cream-bd);
}
.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}
.menu-card:hover .card-img img { transform: scale(1.04); }

/* カードをグリッドで2列表示 */
.menu-grid-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  padding: 10px 6px;
}
.menu-grid-wrap .menu-card {
  margin: 0 6px 10px;
}

.sold-badge {
  position: absolute;
  top: 0; left: 0;
  background: var(--text-md);
  color: var(--cream);
  font-family: 'EB Garamond', serif;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 3px 8px;
  z-index: 1;
}
.in-cart-dot {
  position: absolute;
  top: 8px; right: 8px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--green);
  color: var(--cream);
  font-size: 11px;
  font-family: 'EB Garamond', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  z-index: 1;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* ── SUBSCREENS ── */
.subscreen {
  flex: 1;
  overflow-y: auto;
  background: var(--ivory);
  display: none;
  padding: 16px 14px;
}
.subscreen.show { display: block; }
.subscreen::-webkit-scrollbar { width: 3px; }
.subscreen::-webkit-scrollbar-thumb { background: var(--cream-bd); }

.sub-hd {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 400;
  color: var(--green);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--cream-bd);
}

/* Cart rows */
.cart-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--cream-dk);
  font-family: 'EB Garamond', serif;
}
.cart-row:last-of-type { border-bottom: none; }
.cart-row-emoji { font-size: 18px; }
.cart-row-name { flex: 1; font-size: 13px; color: var(--text-dk); line-height: 1.4; }
.qty-ctrl { display: flex; align-items: center; gap: 4px; }
.qty-btn {
  width: 44px; height: 44px;
  border: 1px solid var(--cream-bd);
  background: transparent;
  color: var(--text-dk);
  font-size: 20px;
  cursor: pointer;
  font-family: 'EB Garamond', serif;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.qty-btn:hover { border-color: var(--green); background: var(--cream-dk); }
.qty-btn:active { background: var(--cream-bd); }
.qty-num { font-size: 14px; min-width: 24px; text-align: center; color: var(--text-dk); font-weight: 500; }
.cart-row-price { font-size: 12px; font-style: italic; color: var(--gold); min-width: 58px; text-align: right; }

.cart-total-block {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--green);
}
.total-line {
  display: flex;
  justify-content: space-between;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  color: var(--green);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.total-line span:last-child { font-style: italic; color: var(--gold); font-size: 15px; }

.order-btn {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: var(--cream);
  border: none;
  font-family: 'EB Garamond', serif;
  font-size: 12px;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}
.order-btn:hover:not(:disabled) { background: var(--green-lt); }
.order-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.empty-msg {
  text-align: center;
  padding: 60px 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--text-lt);
  letter-spacing: 0.04em;
}

/* ── History ── */
.hist-card {
  background: var(--ivory);
  border: 1px solid var(--cream-bd);
  margin-bottom: 12px;
  overflow: hidden;
}
.hist-card.is-served {
  opacity: 0.7;
}
.hist-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--cream-dk);
}
.hist-num {
  font-family: 'Playfair Display', serif;
  font-size: 14px;
  color: var(--green);
  letter-spacing: 0.04em;
}
.hist-time {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  font-style: italic;
  color: var(--text-lt);
}

/* ステッパー */
.hist-stepper {
  display: flex;
  align-items: flex-start;
  padding: 14px 10px 10px;
  gap: 0;
}
.step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  position: relative;
}
.step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 10px;
  left: calc(50% + 10px);
  right: calc(-50% + 10px);
  height: 1px;
  background: var(--cream-bd);
  z-index: 0;
}
.step:not(:last-child).done::after {
  background: var(--green);
}
.step-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--cream-bd);
  background: var(--ivory);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
  flex-shrink: 0;
}
.step.done .step-dot {
  background: var(--green);
  border-color: var(--green);
}
.step.done .step-dot::after {
  content: '';
  display: block;
  width: 6px; height: 10px;
  border: 1.5px solid var(--cream);
  border-top: none; border-left: none;
  transform: rotate(42deg) translate(-1px, -1px);
}
.step.current .step-dot {
  border-color: var(--gold);
  background: var(--ivory);
  box-shadow: 0 0 0 3px rgba(184,154,90,0.18);
}
.step.current .step-dot::after {
  content: '';
  display: block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
}
.step-label {
  font-family: 'EB Garamond', serif;
  font-size: 9px;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-lt);
  text-align: center;
  line-height: 1.3;
}
.step.done .step-label { color: var(--green); }
.step.current .step-label { color: var(--gold); font-weight: 500; }

/* 提供完了バナー */
.served-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--sage-lt, #EBF2EC);
  border-top: 1px solid var(--cream-bd);
  font-family: 'EB Garamond', serif;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--green);
}
.served-banner svg {
  width: 14px; height: 14px;
  stroke: var(--green);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

.hist-items-list {
  padding: 0 14px 12px;
  border-top: 1px solid var(--cream-dk);
}
.hist-item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 0.5px solid var(--cream-dk);
  font-family: 'EB Garamond', serif;
  font-size: 12px;
  color: var(--text-md);
}
.hist-item-row:last-child { border-bottom: none; }
.hist-item-thumb {
  width: 32px; height: 32px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid var(--cream-bd);
}
.hist-item-name { flex: 1; }
.hist-item-qty {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  font-size: 13px;
}

/* ── KANBAN (Staff) ── */
.kanban-wrap { }
.kanban-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}
.kanban-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--green);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.k-clock {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  font-style: italic;
  color: var(--text-lt);
}
.kanban-cols { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.k-col-label {
  font-family: 'EB Garamond', serif;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-lt);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--cream-bd);
}
.k-card {
  border: 1px solid var(--cream-bd);
  padding: 10px;
  margin-bottom: 8px;
  background: var(--ivory);
}
.k-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.k-num { font-family: 'Playfair Display', serif; font-size: 12px; color: var(--green); }
.k-tbl { font-family: 'EB Garamond', serif; font-size: 10px; letter-spacing: 0.1em; padding: 2px 6px; border: 1px solid var(--gold); color: var(--gold); }
.k-time { font-size: 10px; font-style: italic; color: var(--text-lt); margin-bottom: 6px; font-family: 'Cormorant Garamond', serif; }
.k-items { font-size: 11px; color: var(--text-md); list-style: none; margin-bottom: 8px; font-family: 'EB Garamond', serif; }
.k-items li { padding: 1px 0; }
.k-btn {
  width: 100%;
  padding: 6px;
  font-family: 'EB Garamond', serif;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.k-next { background: var(--green); color: var(--cream); border: none; }
.k-done { background: transparent; border: 1px solid var(--green); color: var(--green); }
.k-close { background: transparent; border: 1px solid var(--cream-bd); color: var(--text-lt); }
.k-empty { font-size: 11px; font-style: italic; color: var(--text-lt); font-family: 'Cormorant Garamond', serif; padding: 4px 0; }

/* ── BOTTOM TAB ── */
.bottom-bar {
  background: var(--green);
  display: flex;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.tab-item {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 9px 0;
  font-family: 'EB Garamond', serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(246,241,233,0.45);
  cursor: pointer; border: none; background: transparent;
  transition: color 0.2s; position: relative;
}
.tab-item.active { color: var(--gold-lt); }
.tab-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.tab-item.active .tab-icon {
  border-bottom: 1px solid var(--gold);
}
.tab-badge {
  position: absolute; top: 7px; right: calc(50% - 20px);
  background: var(--gold); color: var(--green);
  font-size: 9px; font-weight: 600;
  min-width: 15px; height: 15px;
  border-radius: 99px;
  display: none; align-items: center; justify-content: center;
  padding: 0 3px;
}

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(27,58,45,0.6);
  align-items: center; justify-content: center; z-index: 999;
}
.modal-bg.show { display: flex; }
.modal-box {
  background: var(--ivory);
  border: 1px solid var(--cream-bd);
  padding: 36px 28px;
  width: 270px; text-align: center;
}
.modal-ornament {
  font-family: 'Playfair Display', serif;
  font-size: 28px; color: var(--gold);
  margin-bottom: 12px; display: block;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 14px; font-weight: 400;
  color: var(--green);
  letter-spacing: 0.10em; text-transform: uppercase;
  margin-bottom: 8px;
}
.modal-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 12px;
  color: var(--text-lt); margin-bottom: 4px;
}
.modal-num {
  font-family: 'Playfair Display', serif;
  font-size: 30px; color: var(--green);
  letter-spacing: 0.08em; margin: 12px 0;
}
.modal-close {
  margin-top: 16px;
  padding: 9px 22px;
  background: transparent;
  border: 1px solid var(--cream-bd);
  font-family: 'EB Garamond', serif;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-md); cursor: pointer; transition: border-color 0.15s;
}
.modal-close:hover { border-color: var(--green); color: var(--green); }

/* ── DIVIDER ORNAMENT ── */
.ornament-line {
  display: flex; align-items: center; gap: 8px;
  margin: 4px 0 10px;
}
.ornament-line::before,.ornament-line::after {
  content:''; flex:1; height:1px; background: var(--cream-bd);
}
.ornament-line span {
  font-size: 10px; color: var(--gold); letter-spacing: 0.2em;
}
</style>
</head>
<body>

<div class="shell">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="brand">Ralph's <em>Café</em></div>
    <button class="call-btn">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Call Staff
    </button>
  </div>

  <!-- BODY -->
  <div class="body-area">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="side-item active" onclick="selectCat('coffee',this)">Coffee</div>
      <div class="side-item" onclick="selectCat('noncoffee',this)">Non Coffee</div>
      <div class="side-item" onclick="selectCat('tea',this)">Tea</div>
      <div class="side-item" onclick="selectCat('food',this)">Food</div>
      <div class="side-item" onclick="selectCat('sweets',this)">Sweets</div>
      <div class="side-item" onclick="selectCat('merchandise',this)">Merchandise</div>
    </div>

    <!-- MENU -->
    <div class="menu-area" id="menu-area"></div>

    <!-- CART -->
    <div class="subscreen" id="cart-screen">
      <div class="sub-hd">Your Order</div>
      <div id="cart-list"></div>
      <div class="cart-total-block">
        <div class="total-line"><span>Total</span><span id="cart-total">¥0</span></div>
        <button class="order-btn" id="order-btn" disabled onclick="placeOrder()">Place Order</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="subscreen" id="history-screen">
      <div class="sub-hd">Order History</div>
      <div id="history-list"><div class="empty-msg">No orders yet.</div></div>
    </div>

  </div>

  <!-- BOTTOM TAB -->
  <div class="bottom-bar">
    <button class="tab-item active" id="tab-menu" onclick="switchTab('menu')">
      <div class="tab-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </div>
      Menu
    </button>
    <button class="tab-item" id="tab-cart" onclick="switchTab('cart')">
      <div class="tab-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </div>
      Cart
      <span class="tab-badge" id="cart-badge">0</span>
    </button>
    <button class="tab-item" id="tab-history" onclick="switchTab('history')">
      <div class="tab-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      History
    </button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <span class="modal-ornament">✦</span>
    <div class="modal-title">Order Received</div>
    <div class="ornament-line"><span>✦</span></div>
    <div class="modal-sub">Order Number</div>
    <div class="modal-num" id="modal-num">#001</div>
    <div class="modal-sub">Please wait at your table</div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const MENU_DATA = {
  coffee:{ label:"Coffee", items:[
    {id:1,  name:"Ralph's Blend",         price:550,  emoji:'☕', img:'https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=300&q=80'},
    {id:2,  name:'Espresso',              price:480,  emoji:'☕', img:'https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=300&q=80'},
    {id:3,  name:'Cappuccino',            price:600,  emoji:'☕', img:'https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=300&q=80'},
    {id:4,  name:'Café Latte',            price:620,  emoji:'🥛', img:'https://images.unsplash.com/photo-1561882468-9110e03e0f78?w=300&q=80'},
    {id:5,  name:'Flat White',            price:620,  emoji:'☕', img:'https://images.unsplash.com/photo-1592663527359-cf6642f54cff?w=300&q=80'},
    {id:6,  name:'Americano',             price:550,  emoji:'☕', img:'https://images.unsplash.com/photo-1534778101976-62847782c213?w=300&q=80'},
    {id:7,  name:'Iced Latte',            price:680,  emoji:'🧊', img:'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=300&q=80'},
    {id:8,  name:'Cold Brew',             price:700,  emoji:'🫙', img:'https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=300&q=80'},
  ]},
  noncoffee:{ label:"Non Coffee", items:[
    {id:9,  name:'Matcha Latte',          price:680,  emoji:'🍵', img:'https://images.unsplash.com/photo-1536256263959-770b48d82b0a?w=300&q=80'},
    {id:10, name:'Hojicha Latte',         price:680,  emoji:'🍵', img:'https://images.unsplash.com/photo-1545696968-1a31da4d56d6?w=300&q=80'},
    {id:11, name:'Chocolate',             price:650,  emoji:'🍫', img:'https://images.unsplash.com/photo-1542990253-0d0f5be5f0ed?w=300&q=80'},
    {id:12, name:'Strawberry Lemonade',   price:700,  emoji:'🍓', img:'https://images.unsplash.com/photo-1523677011781-c91d1bbe2f9e?w=300&q=80'},
    {id:13, name:'Still Water',           price:300,  emoji:'💧', img:'https://images.unsplash.com/photo-1548839140-29a749e1cf4d?w=300&q=80'},
  ]},
  tea:{ label:"Tea", items:[
    {id:14, name:'Earl Grey',             price:600,  emoji:'🫖', img:'https://images.unsplash.com/photo-1563911892437-1feda0179e1b?w=300&q=80'},
    {id:15, name:'English Breakfast',     price:600,  emoji:'🫖', img:'https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=300&q=80'},
    {id:16, name:'Chamomile',             price:600,  emoji:'🌼', img:'https://images.unsplash.com/photo-1587049352846-4a222e784d38?w=300&q=80'},
    {id:17, name:'Iced Tea',              price:650,  emoji:'🧊', img:'https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=300&q=80'},
  ]},
  food:{ label:"Food", items:[
    {id:18, name:'Croque Monsieur',       price:1100, emoji:'🥪', img:'https://images.unsplash.com/photo-1528736235302-52922df5c122?w=300&q=80'},
    {id:19, name:'Avocado Toast',         price:1000, emoji:'🥑', img:'https://images.unsplash.com/photo-1603046891744-76e6300f82ef?w=300&q=80'},
    {id:20, name:'Granola Bowl',          price:950,  emoji:'🥣', img:'https://images.unsplash.com/photo-1505253716362-afaea1d3d1af?w=300&q=80'},
    {id:21, name:'Bagel & Cream Cheese',  price:850,  emoji:'🥯', img:'https://images.unsplash.com/photo-1592415486689-125cbbfcbee2?w=300&q=80'},
    {id:22, name:'Croissant',             price:550,  emoji:'🥐', img:'https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=300&q=80'},
  ]},
  sweets:{ label:"Sweets", items:[
    {id:23, name:'Ralph\'s Cheesecake',   price:780,  emoji:'🍰', img:'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=300&q=80'},
    {id:24, name:'Chocolate Brownie',     price:680,  emoji:'🍫', img:'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=300&q=80'},
    {id:25, name:'Scone',                 price:580,  emoji:'🫐', img:'https://images.unsplash.com/photo-1613040809024-b4ef7ba99bc3?w=300&q=80'},
    {id:26, name:'Muffin',                price:520,  emoji:'🧁', img:'https://images.unsplash.com/photo-1607958996333-41aef7caefaa?w=300&q=80'},
    {id:27, name:'Canelé',                price:480,  emoji:'🍮', img:'https://images.unsplash.com/photo-1509365390695-33aee754301f?w=300&q=80'},
  ]},
  merchandise:{ label:"Merchandise", items:[
    {id:28, name:'Ralph\'s Coffee Beans 200g', price:2200, emoji:'☕', img:'https://images.unsplash.com/photo-1559056199-641a0ac8b55e?w=300&q=80'},
    {id:29, name:'Ralph\'s Drip Bag × 5',     price:1500, emoji:'☕', img:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&q=80'},
    {id:30, name:'Original Tote Bag',          price:3500, emoji:'👜', img:'https://images.unsplash.com/photo-1544816155-12df9643f363?w=300&q=80'},
    {id:31, name:'Original Tumbler',           price:4800, emoji:'🥤', img:'https://images.unsplash.com/photo-1602143407151-7111542de6e8?w=300&q=80'},
  ]},
};

let cart={}, orders=[], counter=1, currentCat='coffee';
const allItems=()=>Object.values(MENU_DATA).flatMap(s=>s.items);

const STORAGE_KEY = 'ralphs_orders';
const COUNTER_KEY = 'ralphs_counter';

function loadSharedOrders(){
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    orders = saved ? JSON.parse(saved).map(o=>({...o, time: new Date(o.time)})) : [];
    const c = localStorage.getItem(COUNTER_KEY);
    counter = c ? parseInt(c) : 1;
  } catch(e){ orders=[]; counter=1; }
}

function saveSharedOrders(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    localStorage.setItem(COUNTER_KEY, String(counter));
  } catch(e){}
}

// スタッフ画面でステータスが更新されたら履歴に反映
window.addEventListener('storage', (e)=>{
  if(e.key === STORAGE_KEY){
    loadSharedOrders();
    renderHistory();
    // Historyタブを表示中でなくてもバッジ更新
    if(document.getElementById('history-screen').classList.contains('show')){
      renderHistory();
    }
  }
});

loadSharedOrders();

function renderMenu(cat){
  const area=document.getElementById('menu-area');
  const sec=MENU_DATA[cat];
  const cards = sec.items.map(item=>{
    const qty=cart[item.id]||0;
    const imgHtml = item.img
      ? `<img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<span style="display:none;align-items:center;justify-content:center;font-size:36px;width:100%;height:100%">${item.emoji}</span>`
      : `<span>${item.emoji}</span>`;
    return `<div class="menu-card${item.soldOut?' sold-out':''}" onclick="addToCart(${item.id})">
      ${item.soldOut?'<span class="sold-badge">Sold Out</span>':''}
      ${(!item.soldOut&&qty>0)?`<span class="in-cart-dot">${qty}</span>`:''}
      <div class="card-img">${imgHtml}</div>
      <div class="card-info">
        <div class="card-name">${item.name}</div>
        <div class="card-price">¥${item.price.toLocaleString()}</div>
      </div>
    </div>`;
  }).join('');
  area.innerHTML=
    `<div class="section-hd"><div class="section-hd-label">${sec.label}</div></div>`
    + `<div class="menu-grid-wrap">${cards}</div>`;
}

function selectCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.side-item').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  renderMenu(cat);
}

function addToCart(id){
  cart[id]=(cart[id]||0)+1;
  updateBadge();
  renderMenu(currentCat);
}

function changeQty(id,d){
  cart[id]=(cart[id]||0)+d;
  if(cart[id]<=0) delete cart[id];
  updateBadge();
  renderCartScreen();
  renderMenu(currentCat);
}

function updateBadge(){
  const n=Object.values(cart).reduce((a,b)=>a+b,0);
  const b=document.getElementById('cart-badge');
  b.style.display=n>0?'flex':'none';
  b.textContent=n;
}

function renderCartScreen(){
  const ids=Object.keys(cart);
  const list=document.getElementById('cart-list');
  const btn=document.getElementById('order-btn');
  const tot=document.getElementById('cart-total');
  if(!ids.length){
    list.innerHTML='<div class="empty-msg">Your cart is empty.</div>';
    btn.disabled=true; tot.textContent='¥0'; return;
  }
  let total=0;
  list.innerHTML=ids.map(id=>{
    const item=allItems().find(i=>i.id==id);
    total+=item.price*cart[id];
    const thumb = item.img
      ? `<img src="${item.img}" alt="${item.name}" style="width:48px;height:48px;object-fit:cover;flex-shrink:0;border:1px solid var(--cream-bd);">`
      : `<span style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--cream-dk);flex-shrink:0;border:1px solid var(--cream-bd);">${item.emoji}</span>`;
    return `<div class="cart-row">
      ${thumb}
      <span class="cart-row-name">${item.name}</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
        <span class="qty-num">${cart[id]}</span>
        <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
      </div>
      <span class="cart-row-price">¥${(item.price*cart[id]).toLocaleString()}</span>
    </div>`;
  }).join('');
  tot.textContent='¥'+total.toLocaleString();
  btn.disabled=false;
}

function placeOrder(){
  const num=String(counter).padStart(3,'0');
  const items=Object.keys(cart).map(id=>{
    const item=allItems().find(i=>i.id==id);
    return{name:item.name,emoji:item.emoji,qty:cart[id]};
  });
  orders.push({num, table:'T3', items, status:'received', time: new Date().toISOString()});
  counter++;
  saveSharedOrders();
  document.getElementById('modal-num').textContent='#'+num;
  document.getElementById('modal').classList.add('show');
  cart={};
  updateBadge(); renderCartScreen(); renderMenu(currentCat);
}

function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!orders.length){ el.innerHTML='<div class="empty-msg">No orders yet.</div>'; return; }

  const STEPS = [
    { key:'received',  label:'Order\nReceived' },
    { key:'preparing', label:'Preparing' },
    { key:'ready',     label:'Ready' },
    { key:'done',      label:'Delivered' },
  ];
  const STATUS_ORDER = { received:0, preparing:1, ready:2, done:3 };

  el.innerHTML=[...orders].reverse().map(o=>{
    const currentIdx = STATUS_ORDER[o.status] ?? 0;
    const isServed = o.status === 'done';
    const orderTime = new Date(o.time);
    const timeStr = orderTime.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

    const stepperHtml = STEPS.map((step, idx)=>{
      let cls = '';
      if(idx < currentIdx) cls = 'done';
      else if(idx === currentIdx) cls = 'current';
      return `<div class="step ${cls}">
        <div class="step-dot"></div>
        <div class="step-label">${step.label.replace('\n','<br>')}</div>
      </div>`;
    }).join('');

    const itemsHtml = o.items.map(item=>{
      const menuItem = allItems().find(i=>i.name===item.name);
      const thumb = menuItem?.img
        ? `<img class="hist-item-thumb" src="${menuItem.img}" alt="${item.name}">`
        : `<span style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--cream-dk);flex-shrink:0;border:1px solid var(--cream-bd);">${item.emoji}</span>`;
      return `<div class="hist-item-row">
        ${thumb}
        <span class="hist-item-name">${item.name}</span>
        <span class="hist-item-qty">×${item.qty}</span>
      </div>`;
    }).join('');

    const servedBanner = isServed
      ? `<div class="served-banner">
          <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M12 7V4"/><circle cx="12" cy="12" r="2"/></svg>
          Delivered to your table
        </div>`
      : '';

    return `<div class="hist-card${isServed?' is-served':''}">
      <div class="hist-top-bar">
        <span class="hist-num">Order #${o.num} · ${o.table}</span>
        <span class="hist-time">${timeStr}</span>
      </div>
      <div class="hist-stepper">${stepperHtml}</div>
      <div class="hist-items-list">${itemsHtml}</div>
      ${servedBanner}
    </div>`;
  }).join('');
}

function switchTab(tab){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  const sidebar=document.getElementById('sidebar');
  const menuArea=document.getElementById('menu-area');
  const isMenu=tab==='menu';
  sidebar.style.display=isMenu?'block':'none';
  menuArea.style.display=isMenu?'block':'none';
  ['cart','history'].forEach(s=>{
    document.getElementById(s+'-screen').classList.toggle('show', tab===s);
  });
  if(tab==='cart') renderCartScreen();
  if(tab==='history') renderHistory();
}

renderMenu('coffee');
</script>
</body>
</html>
